metrics_to_run:
  - quiz_quality
  - revision_relevance

custom_metrics:
  - name: quiz_quality
    prompt_template: |
      You are an expert educator evaluating the quality of quiz questions generated by an AI agent.
      
      Evaluate the questions generated in the agent's trace.
      Grade the questions on a scale of 1 to 5 according to the following criteria:
      1: Trivial rote memorization questions only.
      2: Mostly memorization with some basic understanding.
      3: Tests understanding but lacks depth or application.
      4: Good mix of understanding and application questions.
      5: Excellent questions that test deep understanding and real-world application.
      
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}
      
      Return your evaluation as a valid JSON object:
      {{
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale>"
      }}
      
  - name: revision_relevance
    prompt_template: |
      You are an expert study coach evaluating a generated revision plan.
      
      Review the generated revision plan and compare it to the user's weak areas in the agent's state or trace.
      Grade the relevance on a scale of 1 to 5:
      1: The plan completely ignores the user's weak areas.
      2: The plan mentions weak areas but focuses mainly on topics the user already knows.
      3: The plan addresses weak areas but is generic.
      4: The plan is highly targeted to weak areas with specific study methods.
      5: The plan is perfectly tailored to weak areas, highly actionable, and structured excellently.
      
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}
      
      Return your evaluation as a valid JSON object:
      {{
        "score": <integer between 1 and 5>,
        "explanation": "<detailed string explaining the rationale>"
      }}
